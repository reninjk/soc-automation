name: SOC Automation CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install flake8 black mypy

      - name: Run flake8
        run: flake8 . --max-line-length=120 --exclude=.git,__pycache__

      - name: Check black formatting
        run: black --check --line-length=120 .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing || true

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: bandit -r . -ll --exclude ./.git,./tests -f txt || true

  validate-scripts:
    name: Validate Script Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required files..."
          test -f requirements.txt || (echo "MISSING: requirements.txt" && exit 1)
          test -f README.md || (echo "MISSING: README.md" && exit 1)
          test -f ioc-enrichment/enrich_ioc.py || (echo "MISSING: ioc-enrichment/enrich_ioc.py" && exit 1)
          test -f alert-triage/auto_triage.py || (echo "MISSING: alert-triage/auto_triage.py" && exit 1)
          echo "All required files present."

      - name: Check Python syntax
        run: |
          python -m py_compile ioc-enrichment/enrich_ioc.py && echo "enrich_ioc.py OK"
          python -m py_compile alert-triage/auto_triage.py && echo "auto_triage.py OK"

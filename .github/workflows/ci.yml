name: SOC Automation CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install flake8 pyyaml

      - name: Syntax check Python files
        run: |
          find . -name "*.py" -not -path "./.git/*" | xargs -I{} python -m py_compile {} && echo "All Python files parse OK"

      - name: Lint Python (errors only — no style enforcement)
        run: |
          flake8 . --select=E9,F63,F7,F82 --exclude=.git,__pycache__ || true

      - name: Validate YAML files
        run: |
          python - <<'EOF'
          import os, sys, yaml
          errors = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d != '.git']
              for f in files:
                  if f.endswith(('.yml', '.yaml')):
                      path = os.path.join(root, f)
                      try:
                          with open(path) as fh:
                              yaml.safe_load(fh)
                      except yaml.YAMLError as e:
                          errors.append(f"{path}: {e}")
          if errors:
              print("YAML errors found:")
              for e in errors: print(" ", e)
              sys.exit(1)
          else:
              print(f"All YAML files valid")
          EOF

      - name: Check for secrets accidentally committed
        run: |
          if grep -rn "AKIA[0-9A-Z]\{16\}\|sk-[a-zA-Z0-9]\{32\}" --include="*.py" --include="*.yml" --include="*.yaml" . 2>/dev/null; then
            echo "WARNING: Possible AWS/API key pattern detected"
            exit 1
          fi
          echo "No obvious secrets found"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-mock python-dotenv structlog requests 2>/dev/null || true

      - name: Run tests (informational — failures do not block merge)
        run: |
          pytest tests/ -v --tb=short 2>&1 || echo "Some tests skipped or failed — see output above"
        env:
          VT_API_KEY: test-key
          ABUSEIPDB_API_KEY: test-key
          OTX_API_KEY: test-key

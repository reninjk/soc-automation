name: Weekly SOC Digest

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  weekly-digest:
    name: Generate Weekly SOC Digest
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        continue-on-error: true
        run: |
          pip install --quiet -r requirements.txt || true

      - name: Generate weekly activity digest
        run: |
          echo "## Weekly SOC Automation Digest"
          echo "Generated: $(date -u +'%Y-%m-%d %H:%M UTC')"
          echo ""
          echo "### Repository Activity (last 7 days)"
          git log --oneline --since="7 days ago" --format="- %s (%ar by %an)" || echo "No commits this week"
          echo ""
          echo "### Script Inventory"
          echo "Alert triage   : $(find alert-triage -name '*.py' 2>/dev/null | wc -l) scripts"
          echo "IOC enrichment : $(find ioc-enrichment -name '*.py' 2>/dev/null | wc -l) scripts"
          echo "Reporting      : $(find reporting -name '*.py' 2>/dev/null | wc -l) scripts"
          echo "Tests          : $(find tests -name 'test_*.py' 2>/dev/null | wc -l) files"

      - name: Python syntax check
        continue-on-error: true
        run: |
          echo "### Python Syntax Check"
          find . -name "*.py" -not -path "./.git/*" | while read f; do
            python -m py_compile "$f" && echo "OK: $f" || echo "FAIL: $f"
          done
